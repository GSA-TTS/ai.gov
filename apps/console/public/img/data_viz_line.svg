<?xml version="1.0" encoding="UTF-8"?>
<svg
  viewBox="0 0 440 200"
  width="100%"
  height="auto"
  preserveAspectRatio="xMinYMin meet"
  xmlns="http://www.w3.org/2000/svg"
>  <!-- Axes -->
  <line x1="50" y1="180" x2="380" y2="180" stroke="#ccc" /> <!-- X-axis -->
  <line x1="380" y1="20"  x2="380" y2="180" stroke="#ccc" /> <!-- Y-axis -->

  <!-- Horizontal grid lines (lighter) -->
  <line x1="50" y1="180" x2="380" y2="180" stroke="#eee" />
  <line x1="50" y1="140" x2="380" y2="140" stroke="#eee" />
  <line x1="50" y1="100" x2="380" y2="100" stroke="#eee" />
  <line x1="50" y1="60"  x2="380" y2="60"  stroke="#eee" />

  <!-- Vertical grid lines (lighter) -->
  <line x1="90"  y1="20" x2="90"  y2="180" stroke="#f2f2f2" />
  <line x1="200" y1="20" x2="200" y2="180" stroke="#f2f2f2" />
  <line x1="310" y1="20" x2="310" y2="180" stroke="#f2f2f2" />

  <!-- Y-axis labels on the right -->
  <text x="385" y="180" font-size="12" fill="#666" text-anchor="start">0K</text>
  <text x="385" y="140" font-size="12" fill="#666" text-anchor="start">20K</text>
  <text x="385" y="100" font-size="12" fill="#666" text-anchor="start">40K</text>
  <text x="385" y="60"  font-size="12" fill="#666" text-anchor="start">60K</text>

  <!-- X-axis month labels at bottom -->
  <text x="90"  y="195" font-size="12" fill="#666" text-anchor="middle">May</text>
  <text x="200" y="195" font-size="12" fill="#666" text-anchor="middle">June</text>
  <text x="310" y="195" font-size="12" fill="#666" text-anchor="middle">July</text>

  <!-- Data line -->
  <polyline
    fill="none"
    stroke="#5AB17B"
    stroke-width="2"
    points="90,160 150,120 200,100 260,80 310,60"
  />

  <!-- Data points -->
  <circle cx="90"  cy="160" r="3" fill="#5AB17B" />
  <circle cx="200" cy="100" r="3" fill="#5AB17B" />
  <circle cx="310" cy="60"  r="3" fill="#5AB17B" />
</svg>